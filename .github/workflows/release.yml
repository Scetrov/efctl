name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${GITHUB_REF_NAME}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w -X efctl/cmd.Version=${VERSION} -X efctl/cmd.CommitSHA=${COMMIT} -X efctl/cmd.BuildDate=${DATE}"
          BINARY_NAME=efctl-${{ matrix.goos }}-${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME=${BINARY_NAME}.exe
          fi
          mkdir -p output
          go build -trimpath -ldflags="${LDFLAGS}" -o output/$BINARY_NAME main.go

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: output/efctl-*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v8
        with:
          path: binaries
          pattern: binary-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd binaries
          sha256sum efctl-* > checksums.txt
          echo "Generated checksums:"
          cat checksums.txt

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "binaries/efctl-*"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: "binaries/efctl.sbom.spdx.json"

      - name: Attest SBOM
        uses: actions/attest-sbom@v4
        with:
          subject-path: "binaries/efctl-*"
          sbom-path: "binaries/efctl.sbom.spdx.json"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Sign binaries
        run: |
          for file in binaries/efctl-*; do
            cosign sign-blob --yes "$file" --bundle "${file}.bundle"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: binaries/*
          generate_release_notes: true
